{{define "nav"}}
<header>
  <a href="/" class="logo">workflow</a>
  <nav class="main-nav">
    <a href="/"           class="nav-link {{if eq .Nav "tasks"}}active{{end}}">Tasks</a>
    <a href="/sessions"  class="nav-link {{if eq .Nav "sessions"}}active{{end}}">Sessions</a>
    <a href="/notes"     class="nav-link {{if eq .Nav "notes"}}active{{end}}">Notes</a>
    <a href="/templates" class="nav-link {{if eq .Nav "templates"}}active{{end}}">Templates</a>
    <a href="/calendar"  class="nav-link {{if eq .Nav "calendar"}}active{{end}}">Calendar</a>
    <a href="/digest"    class="nav-link {{if eq .Nav "digest"}}active{{end}}">Digest</a>
  </nav>
  <div class="header-actions">
    <a href="/search/tasks" class="nav-search-btn" title="Search tasks">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <a href="/tasks/new" class="btn btn-primary {{if ne .Nav "tasks"}}nav-action-hidden{{end}}">+ New task</a>
  </div>
</header>

<!-- Toast container (shared across all pages) -->
<div id="toast-container" aria-live="polite" aria-label="Reminder notifications"></div>

<script>
(function () {
  'use strict';

  // IDs of reminders already shown this browser session — prevents
  // re-toasting the same reminder on the next poll before dismiss.
  const _shown = new Set(
    JSON.parse(sessionStorage.getItem('wf_shown_reminders') || '[]')
  );

  function _saveShown() {
    sessionStorage.setItem('wf_shown_reminders', JSON.stringify([..._shown]));
  }

  function _escHTML(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function _removeToast(el) {
    el.classList.add('toast-dismissing');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  async function _dismiss(id, el) {
    _shown.add(id);
    _saveShown();
    _removeToast(el);
    try {
      await fetch('/api/reminders/' + id + '/dismiss', { method: 'POST' });
    } catch (_) {
      // Best-effort — the toast is already gone visually.
    }
  }

  function _showToast(rem) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = 'reminder-toast';
    toast.setAttribute('role', 'alert');
    toast.dataset.reminderId = rem.id;

    const noteHTML = rem.note
      ? `<div class="toast-note">${_escHTML(rem.note)}</div>`
      : '';

    toast.innerHTML =
      `<div class="toast-header">` +
        `<a class="toast-title" href="/tasks/${_escHTML(rem.task_id)}">` +
          `⏰ ${_escHTML(rem.task_title)}` +
        `</a>` +
        `<button class="toast-dismiss" aria-label="Dismiss reminder">×</button>` +
      `</div>` +
      noteHTML +
      `<div class="toast-time">${_escHTML(rem.remind_at_formatted)}</div>` +
      `<div class="toast-progress"></div>`;

    toast.querySelector('.toast-dismiss').addEventListener('click', () => {
      _dismiss(rem.id, toast);
    });

    container.appendChild(toast);

    // Auto-dismiss after 10 s.
    const timer = setTimeout(() => _dismiss(rem.id, toast), 10000);

    // Cancel auto-dismiss while the user hovers (gives time to click the link).
    toast.addEventListener('mouseenter', () => clearTimeout(timer));
    toast.addEventListener('mouseleave', () => {
      setTimeout(() => _dismiss(rem.id, toast), 3000);
    });
  }

  async function _poll() {
    let due;
    try {
      const resp = await fetch('/api/reminders/due');
      if (!resp.ok) return;
      due = await resp.json();
    } catch (_) {
      return; // network error — try again next tick
    }

    if (!Array.isArray(due)) return;

    for (const rem of due) {
      if (!_shown.has(rem.id)) {
        _shown.add(rem.id);
        _saveShown();
        _showToast(rem);
      }
    }
  }

  // Poll immediately, then every 60 s.
  _poll();
  setInterval(_poll, 60_000);
})();
</script>
{{end}}
