{{define "nav"}}
<header>
  <a href="/" class="logo">workflow</a>
  <nav class="main-nav">
    <a href="/"           class="nav-link {{if eq .Nav "tasks"}}active{{end}}">Tasks</a>
    <a href="/sessions"  class="nav-link {{if eq .Nav "sessions"}}active{{end}}">Sessions</a>
    <a href="/notes"     class="nav-link {{if eq .Nav "notes"}}active{{end}}">Notes</a>
    <a href="/templates" class="nav-link {{if eq .Nav "templates"}}active{{end}}">Templates</a>
    <a href="/calendar"  class="nav-link {{if eq .Nav "calendar"}}active{{end}}">Calendar</a>
    <a href="/digest"    class="nav-link {{if eq .Nav "digest"}}active{{end}}">Digest</a>
    <a href="/standup"  class="nav-link {{if eq .Nav "standup"}}active{{end}}">Standup</a>
    <a href="/activity" class="nav-link {{if eq .Nav "activity"}}active{{end}}">Activity</a>
    <a href="/archive"  class="nav-link {{if eq .Nav "archive"}}active{{end}}">Archive</a>
    <a href="/blocked"  class="nav-link {{if eq .Nav "blocked"}}active{{end}}">Blocked</a>
  </nav>
  <div class="header-actions">
    <a href="/search/tasks" class="nav-search-btn" title="Search tasks">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </a>
    <a href="/tasks/new" class="btn btn-primary {{if ne .Nav "tasks"}}nav-action-hidden{{end}}">+ New task</a>
  </div>
</header>

<!-- Toast container (shared across all pages) -->
<div id="toast-container" aria-live="polite" aria-label="Reminder notifications"></div>

<!-- Command palette -->
<div id="cmd-palette" class="cmd-palette" role="dialog" aria-modal="true" aria-label="Command palette" style="display:none">
  <div class="cmd-backdrop" onclick="closePalette()"></div>
  <div class="cmd-box">
    <div class="cmd-input-wrap">
      <svg class="cmd-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="cmd-input" class="cmd-input" type="text" placeholder="Go to task, or type a command…" autocomplete="off" spellcheck="false">
      <kbd class="cmd-esc-hint">esc</kbd>
    </div>
    <div id="cmd-results" class="cmd-results"></div>
  </div>
</div>

<script>
// ── Command palette ────────────────────────────────────────────────────────
(function () {
  'use strict';

  const STATIC_ACTIONS = [
    { label: '+ New task',       href: '/tasks/new',    icon: '✚' },
    { label: 'Board',            href: '/',             icon: '⬛' },
    { label: 'Sessions',         href: '/sessions',     icon: '💬' },
    { label: 'Search sessions',  href: '/search',       icon: '🔍' },
    { label: 'Search notes',     href: '/search/notes', icon: '🔍' },
    { label: 'Notes',            href: '/notes',        icon: '📝' },
    { label: 'Calendar',         href: '/calendar',     icon: '📅' },
    { label: 'Templates',        href: '/templates',    icon: '📋' },
    { label: 'Digest',           href: '/digest',       icon: '📊' },
    { label: 'Standup',          href: '/standup',      icon: '🎤' },
  ];

  let _open = false;
  let _selected = 0;
  let _items = [];
  let _debounce = null;

  function openPalette() {
    if (_open) return;
    _open = true;
    const el = document.getElementById('cmd-palette');
    el.style.display = '';
    const input = document.getElementById('cmd-input');
    input.value = '';
    renderItems('');
    requestAnimationFrame(() => input.focus());
  }

  window.closePalette = function () {
    if (!_open) return;
    _open = false;
    document.getElementById('cmd-palette').style.display = 'none';
  };

  function renderItems(q) {
    const box = document.getElementById('cmd-results');
    if (!q.trim()) {
      // Show recent tasks first, then static nav actions
      fetch('/api/tasks/recent').then(r => r.ok ? r.json() : []).then(recent => {
        const tierLabel = { today: 'Today', 'this-week': 'This week', backlog: 'Backlog' };
        const recentItems = (recent || []).map(t => ({
          type: 'task', label: t.title, href: '/tasks/' + t.id,
          tier: t.tier, tierLabel: tierLabel[t.tier] || t.tier,
        }));
        const actionItems = STATIC_ACTIONS.map(a => ({ ...a, type: 'action' }));
        _items = [...recentItems, ...actionItems];
        _selected = 0;
        const sections = [];
        if (recentItems.length > 0) {
          sections.push('<div class="cmd-section-label">Recent tasks</div>');
          sections.push(...recentItems.map((it, i) =>
            `<div class="cmd-item ${i === _selected ? 'cmd-item-active' : ''}" data-idx="${i}" onclick="selectItem(${i})">
              <span class="cmd-item-tier tier-pill-${_esc(it.tier)}">${_esc(it.tierLabel)}</span>
              <span class="cmd-item-label">${_esc(it.label)}</span>
            </div>`
          ));
          sections.push('<div class="cmd-divider"></div>');
        }
        sections.push('<div class="cmd-section-label">Actions</div>');
        sections.push(...actionItems.map((it, i) => {
          const idx = recentItems.length + i;
          return `<div class="cmd-item ${idx === _selected ? 'cmd-item-active' : ''}" data-idx="${idx}" onclick="selectItem(${idx})">
            <span class="cmd-item-icon">${it.icon}</span>
            <span class="cmd-item-label">${_esc(it.label)}</span>
          </div>`;
        }));
        box.innerHTML = sections.join('');
      }).catch(() => {
        _items = STATIC_ACTIONS.map(a => ({ ...a, type: 'action' }));
        _selected = 0;
        box.innerHTML = _items.map((it, i) =>
          `<div class="cmd-item ${i === _selected ? 'cmd-item-active' : ''}" data-idx="${i}" onclick="selectItem(${i})">
            <span class="cmd-item-icon">${it.icon}</span>
            <span class="cmd-item-label">${_esc(it.label)}</span>
          </div>`
        ).join('');
      });
      return;
    }

    clearTimeout(_debounce);
    _debounce = setTimeout(async () => {
      let tasks = [];
      try {
        const r = await fetch('/api/tasks?q=' + encodeURIComponent(q.trim()));
        if (r.ok) tasks = await r.json();
      } catch (_) {}

      const tierLabel = { today: 'Today', 'this-week': 'This week', backlog: 'Backlog' };

      _items = tasks.map(t => ({
        type: 'task',
        label: t.title,
        href: '/tasks/' + t.id,
        tier: t.tier,
        tierLabel: tierLabel[t.tier] || t.tier,
      }));
      _selected = 0;

      if (_items.length === 0) {
        box.innerHTML = '<div class="cmd-empty">No tasks found</div>';
        return;
      }

      box.innerHTML = _items.map((it, i) =>
        `<div class="cmd-item ${i === _selected ? 'cmd-item-active' : ''}" data-idx="${i}" onclick="selectItem(${i})">
          <span class="cmd-item-tier tier-pill-${_esc(it.tier)}">${_esc(it.tierLabel)}</span>
          <span class="cmd-item-label">${_esc(it.label)}</span>
        </div>`
      ).join('');
    }, 150);
  }

  window.selectItem = function (idx) {
    if (_items[idx]) window.location.href = _items[idx].href;
  };

  function moveSelection(dir) {
    if (_items.length === 0) return;
    _selected = (_selected + dir + _items.length) % _items.length;
    document.querySelectorAll('.cmd-item').forEach((el, i) => {
      el.classList.toggle('cmd-item-active', i === _selected);
      if (i === _selected) el.scrollIntoView({ block: 'nearest' });
    });
  }

  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Global keydown: open palette on Cmd+K / Ctrl+K
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      if (_open) closePalette(); else openPalette();
      return;
    }
    if (!_open) return;
    if (e.key === 'Escape') { e.preventDefault(); closePalette(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); moveSelection(1); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); moveSelection(-1); return; }
    if (e.key === 'Enter') {
      e.preventDefault();
      if (_items[_selected]) window.location.href = _items[_selected].href;
      return;
    }
  });

  // Global ? → shortcuts overlay (only on non-board pages; board handles it itself)
  document.addEventListener('keydown', e => {
    if (_open) return; // palette takes priority
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable) return;
    if (e.key !== '?') return;
    // If the board page is loaded it handles ? itself — skip duplicating
    if (typeof toggleShortcutsOverlay === 'function') return;
    e.preventDefault();
    let overlay = document.getElementById('shortcuts-overlay');
    if (overlay) { overlay.remove(); return; }
    overlay = document.createElement('div');
    overlay.id = 'shortcuts-overlay';
    overlay.className = 'shortcuts-overlay';
    overlay.innerHTML = `
      <div class="shortcuts-box">
        <div class="shortcuts-title">Keyboard shortcuts</div>
        <div class="shortcuts-grid">
          <kbd>⌘K</kbd><span>Command palette (any page)</span>
          <kbd>s</kbd><span>Search tasks &amp; sessions (board)</span>
          <kbd>n</kbd><span>New task — full form (board)</span>
          <kbd>q</kbd><span>Quick-add task (board)</span>
          <kbd>↑ ↓</kbd><span>Move between cards in column (board)</span>
          <kbd>← →</kbd><span>Move between columns (board)</span>
          <kbd>Enter</kbd><span>Open focused card (board)</span>
          <kbd>m</kbd><span>Move focused card to next column (board)</span>
          <kbd>Esc</kbd><span>Close overlay / clear focus</span>
          <kbd>?</kbd><span>Show / hide this</span>
        </div>
      </div>
    `;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.addEventListener('keydown', function escClose(ev) {
      if (ev.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escClose); }
    });
    document.body.appendChild(overlay);
  });

  // Live search on input
  document.addEventListener('input', e => {
    if (e.target.id === 'cmd-input') {
      _selected = 0;
      renderItems(e.target.value);
    }
  });
})();

// ── Reminders ─────────────────────────────────────────────────────────────
(function () {
  'use strict';

  // IDs of reminders already shown this browser session — prevents
  // re-toasting the same reminder on the next poll before dismiss.
  const _shown = new Set(
    JSON.parse(sessionStorage.getItem('wf_shown_reminders') || '[]')
  );

  function _saveShown() {
    sessionStorage.setItem('wf_shown_reminders', JSON.stringify([..._shown]));
  }

  function _escHTML(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function _removeToast(el) {
    el.classList.add('toast-dismissing');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  async function _dismiss(id, el) {
    _shown.add(id);
    _saveShown();
    _removeToast(el);
    try {
      await fetch('/api/reminders/' + id + '/dismiss', { method: 'POST' });
    } catch (_) {
      // Best-effort — the toast is already gone visually.
    }
  }

  function _showToast(rem) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = 'reminder-toast';
    toast.setAttribute('role', 'alert');
    toast.dataset.reminderId = rem.id;

    const noteHTML = rem.note
      ? `<div class="toast-note">${_escHTML(rem.note)}</div>`
      : '';

    toast.innerHTML =
      `<div class="toast-header">` +
        `<a class="toast-title" href="/tasks/${_escHTML(rem.task_id)}">` +
          `⏰ ${_escHTML(rem.task_title)}` +
        `</a>` +
        `<button class="toast-dismiss" aria-label="Dismiss reminder">×</button>` +
      `</div>` +
      noteHTML +
      `<div class="toast-time">${_escHTML(rem.remind_at_formatted)}</div>` +
      `<div class="toast-progress"></div>`;

    toast.querySelector('.toast-dismiss').addEventListener('click', () => {
      _dismiss(rem.id, toast);
    });

    container.appendChild(toast);

    // Auto-dismiss after 10 s.
    const timer = setTimeout(() => _dismiss(rem.id, toast), 10000);

    // Cancel auto-dismiss while the user hovers (gives time to click the link).
    toast.addEventListener('mouseenter', () => clearTimeout(timer));
    toast.addEventListener('mouseleave', () => {
      setTimeout(() => _dismiss(rem.id, toast), 3000);
    });
  }

  async function _poll() {
    let due;
    try {
      const resp = await fetch('/api/reminders/due');
      if (!resp.ok) return;
      due = await resp.json();
    } catch (_) {
      return; // network error — try again next tick
    }

    if (!Array.isArray(due)) return;

    for (const rem of due) {
      if (!_shown.has(rem.id)) {
        _shown.add(rem.id);
        _saveShown();
        _showToast(rem);
      }
    }
  }

  // Poll immediately, then every 60 s.
  _poll();
  setInterval(_poll, 60_000);
})();
</script>
{{end}}
