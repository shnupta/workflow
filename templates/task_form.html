{{define "task_form.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>workflow — {{if .Edit}}Edit{{else}}New task{{end}}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  {{template "nav" .}}
  <main>
    <div class="form-page">
      <h1>{{if .Edit}}Edit task{{else}}New task{{end}}</h1>

      <form method="POST" action="{{if .Edit}}/tasks/{{.Task.ID}}{{else}}/tasks{{end}}" class="task-form">

        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" value="{{.Task.Title}}" placeholder="What needs doing?" required autofocus>
        </div>

        <div class="field">
          <label for="description">Description <span class="optional">(optional)</span></label>
          <textarea id="description" name="description" rows="3" placeholder="Any extra context...">{{.Task.Description}}</textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="work_type">Type</label>
            <select id="work_type" name="work_type">
              {{range .WorkTypes}}
              <option value="{{.Key}}" {{if eq .Key $.Task.WorkType}}selected{{end}}>{{.Label}}</option>
              {{end}}
            </select>
          </div>

          <div class="field">
            <label for="tier">When</label>
            <select id="tier" name="tier">
              {{range .Tiers}}
              <option value="{{.Key}}" {{if eq .Key $.Task.Tier}}selected{{end}}>{{.Label}}</option>
              {{end}}
            </select>
          </div>

          <div class="field">
            <label for="direction">Blocked on</label>
            <select id="direction" name="direction">
              <option value="blocked_on_me"   {{if eq .Task.Direction "blocked_on_me"}}selected{{end}}>Me</option>
              <option value="blocked_on_them" {{if eq .Task.Direction "blocked_on_them"}}selected{{end}}>Them</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="pr_url">PR URL <span class="optional">(optional)</span></label>
          <input type="url" id="pr_url" name="pr_url" value="{{.Task.PRURL}}" placeholder="https://github.com/org/repo/pull/123">
        </div>

        <div class="field">
          <label for="link">Link <span class="optional">(optional)</span></label>
          <input type="url" id="link" name="link" value="{{.Task.Link}}" placeholder="Any relevant URL">
        </div>

        <div class="field">
          <label for="due_date">Due date <span class="optional">(optional)</span></label>
          <input type="date" id="due_date" name="due_date" value="{{formatDate .Task.DueDate}}">
        </div>

        <div class="form-actions">
          <a href="{{if .Edit}}/tasks/{{.Task.ID}}{{else}}/{{end}}" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary">{{if .Edit}}Save changes{{else}}Add task{{end}}</button>
        </div>

      </form>
    </div>
  </main>
</body>
</html>
{{end}}
